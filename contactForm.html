<!DOCTYPE html>
<html>
<head>
    <title>Contact Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }

        .container {
            width: 50%;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h1 {
            text-align: center;
            color: darkblue;
        }

        label {
            font-weight: bold;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        textarea {
            resize: vertical;
        }

        button {
            background-color: green;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkgreen;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Contact Us</h1>

    <form>

        <label for="name">Full Name:</label>
        <input type="text"
               id="name"
               placeholder="Enter your name"
               required>

        <label for="email">Email Address:</label>
        <input type="email"
               id="email"
               placeholder="Enter your email"
               required>

        <label for="phone">Phone Number:</label>
        <input type="tel"
               id="phone"
               placeholder="Enter your phone number"
               required>

        <label for="message">Message:</label>
        <textarea id="message"
                  rows="5"
                  placeholder="Enter your message"
                  required></textarea>

        <button type="submit">
            Send Message
        </button>

    </form>

</div>

</body>
</html>
