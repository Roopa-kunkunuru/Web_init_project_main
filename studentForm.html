<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }

        .container {
            width: 60%;
            margin: 30px auto;
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h1 {
            text-align: center;
            color: darkblue;
        }

        label {
            font-weight: bold;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .radio-group input,
        .checkbox-group input {
            width: auto;
        }

        button {
            padding: 10px 20px;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .submit-btn {
            background-color: green;
        }

        .reset-btn {
            background-color: red;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Student Registration Form</h1>

    <form>

        <h2>Personal Details</h2>

        <label>Full Name:</label>
        <input type="text" placeholder="Enter Full Name" required>

        <label>Father's Name:</label>
        <input type="text" placeholder="Enter Father's Name">

        <label>Mother's Name:</label>
        <input type="text" placeholder="Enter Mother's Name">

        <label>Date of Birth:</label>
        <input type="date">

        <label>Email:</label>
        <input type="email" placeholder="Enter Email Address">

        <label>Mobile Number:</label>
        <input type="tel" placeholder="Enter Mobile Number">

        <div class="radio-group">
            <label>Gender:</label><br><br>

            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
            <input type="radio" name="gender"> Other
        </div>

        <h2>Academic Details</h2>

        <label>Course:</label>

        <select>
            <option>Select Course</option>
            <option>B.Tech - CSE</option>
            <option>B.Tech - ECE</option>
            <option>B.Tech - EEE</option>
            <option>B.Tech - Mechanical</option>
            <option>B.Tech - Civil</option>
        </select>

        <label>Year of Study:</label>

        <select>
            <option>1st Year</option>
            <option>2nd Year</option>
            <option>3rd Year</option>
            <option>4th Year</option>
        </select>

        <label>Previous Qualification:</label>
        <input type="text" placeholder="Intermediate / Diploma">

        <label>Percentage / CGPA:</label>
        <input type="text" placeholder="Enter Percentage or CGPA">

        <h2>Address Details</h2>

        <label>Address:</label>
        <textarea rows="4" placeholder="Enter Address"></textarea>

        <label>City:</label>
        <input type="text" placeholder="Enter City">

        <label>State:</label>
        <input type="text" placeholder="Enter State">

        <label>PIN Code:</label>
        <input type="text" placeholder="Enter PIN Code">

        <div class="checkbox-group">
            <input type="checkbox" required>
            I hereby declare that the information provided is true and correct.
        </div>

        <br><br>

        <button type="submit" class="submit-btn">
            Register
        </button>

        <button type="reset" class="reset-btn">
            Reset
        </button>

    </form>

</div>

</body>
</html>
