<!DOCTYPE html>
<html>
<head>
    <title>Student Marks Sheet</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            text-align: center;
        }

        h1 {
            color: darkblue;
        }

        table {
            width: 70%;
            margin: auto;
            border-collapse: collapse;
            background-color: white;
        }

        table, th, td {
            border: 2px solid black;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        .total {
            background-color: #d1fae5;
            font-weight: bold;
        }

        .result {
            background-color: #bfdbfe;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>Student Marks Sheet</h1>

    <table>

        <tr>
            <th>Subject Code</th>
            <th>Subject Name</th>
            <th>Maximum Marks</th>
            <th>Marks Obtained</th>
        </tr>

        <tr>
            <td>20A1200101</td>
            <td>Adv eng</td>
            <td>70</td>
            <td>60</td>
        </tr>

        <tr>
            <td>20A1200202</td>
            <td>LMS-II</td>
            <td>70</td>
            <td>50</td>
        </tr>

        <tr>
            <td>20A1200801</td>
            <td>ES</td>
            <td>70</td>
            <td>65</td>
        </tr>

        <tr>
            <td>20A1205302</td>
            <td>WAD II</td>
            <td>70</td>
            <td>53</td>
        </tr>

        <tr>
            <td>20A1205402</td>
            <td>DBMS</td>
            <td>70</td>
            <td>68</td>
        </tr>

        <tr>
            <td>20A1205401</td>
            <td>DS</td>
            <td>70</td>
            <td>60</td>
        </tr>

        <tr class="total">
            <td colspan="2">Total</td>
            <td>420</td>
            <td>356</td>
        </tr>

        <tr class="total">
            <td colspan="3">Percentage</td>
            <td>85%</td>
        </tr>

        <tr class="result">
            <td colspan="3">Result</td>
            <td>PASS</td>
        </tr>

    </table>

</body>
</html>
