<!DOCTYPE html>
<html>
<head>
    <title>Feedback Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }

        .container {
            width: 50%;
            margin: 40px auto;
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h1 {
            text-align: center;
            color: darkblue;
        }

        label {
            font-weight: bold;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        textarea {
            resize: vertical;
        }

        button {
            background-color: green;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkgreen;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Feedback Form</h1>

    <form>

        <label for="name">Full Name:</label>
        <input type="text"
               id="name"
               placeholder="Enter your name"
               required>

        <label for="email">Email Address:</label>
        <input type="email"
               id="email"
               placeholder="Enter your email"
               required>

        <label for="rating">Rate Our Service:</label>
        <select id="rating" required>
            <option value="">-- Select Rating --</option>
            <option>Excellent</option>
            <option>Very Good</option>
            <option>Good</option>
            <option>Average</option>
            <option>Poor</option>
        </select>

        <label for="feedback">Feedback:</label>
        <textarea id="feedback"
                  rows="4"
                  placeholder="Enter your feedback"
                  required></textarea>

        <label for="suggestion">Suggestions:</label>
        <textarea id="suggestion"
                  rows="4"
                  placeholder="Enter your suggestions"></textarea>

        <button type="submit">
            Submit Feedback
        </button>

    </form>

</div>

</body>
</html>
