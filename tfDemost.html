<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Formatting Tags Demo</title>
</head>
<body>
    <h1>Heading 1</h1>
    <h2>Heading 2</h2>
    <h3>Heading 3</h3>
    <h4>Heading 4</h4>
    <h5>Heading 5</h5>
    <h6>Heading 6</h6>

    <p>
        This is a paragraph demonstrating various HTML formatting tags.
    </p>

    <p>
        <b>This text is bold.</b>
    </p>

    <p>
        <i>This text is italic.</i>
    </p>

    <p>
        <u>This text is underlined.</u>
    </p>

    <p>
        Mathematical Expression:
        x<sup>2</sup> + y<sup>2</sup>
    </p>

    <p>
        Chemical Formula:
        H<sub>2</sub>O
    </p>

    <p>
        Another Example:
        CO<sub>2</sub> and (a+b)<sup>2</sup>
    </p>

</body>
</html>
